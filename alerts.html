<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Alerts - GISUGO</title>
    <link rel="icon" type="image/png" href="public/images/Gisugo-icon.png">
    <link rel="stylesheet" href="public/css/header-uniform.css?v=2026_menu2">
    <link rel="stylesheet" href="public/css/messages.css?v=12.30">
    <link rel="stylesheet" href="public/css/shared-menu.css">
</head>
<body class="page-alerts">
    <div class="uniform-header">
        <div class="uniform-header-title-container">
            <button class="uniform-header-btn back" aria-label="Back" onclick="history.back()">
                <span class="btn-emoji back-emoji">←</span>
                <span>Back</span>
            </button>
            <div class="uniform-header-title">Alerts</div>
            <button class="uniform-header-btn menu" id="uniformMenuBtn" aria-label="Menu">
                <span class="btn-emoji">📋</span>
                <span>Menu</span>
            </button>
        </div>
        <div class="uniform-header-borderline"></div>
    </div>

    <div class="uniform-menu-overlay" id="uniformMenuOverlay">
        <div class="uniform-menu-items">
            <!-- Menu items dynamically generated by shared-menu.js -->
        </div>
    </div>

    <div class="role-tabs">
        <button class="role-tab-btn active" data-role="worker" id="workerRoleTab">
            <span class="role-tab-text">WORKER</span>
            <span class="role-notification-count" style="display: none;">0</span>
        </button>
        <button class="role-tab-btn" data-role="customer" id="customerRoleTab">
            <span class="role-tab-text">CUSTOMER</span>
            <span class="role-notification-count" style="display: none;">0</span>
        </button>
    </div>

    <div class="alerts-lang-tabs" id="alertsLangTabs">
        <button type="button" class="alerts-lang-tab active" data-alerts-lang="english">ENGLISH</button>
        <button type="button" class="alerts-lang-tab" data-alerts-lang="bisaya">BISAYA</button>
        <button type="button" class="alerts-lang-tab" data-alerts-lang="tagalog">TAGALOG</button>
    </div>

    <div class="tab-content-wrapper customer-content" id="customer-alerts-content" style="display: none;">
        <div class="tab-scroll-container">
            <div class="notifications-container">
                <!-- Customer alerts loaded dynamically -->
            </div>
        </div>
    </div>

    <div class="tab-content-wrapper worker-content active" id="worker-alerts-content">
        <div class="tab-scroll-container">
            <div class="notifications-container">
                <!-- Worker alerts loaded dynamically -->
            </div>
        </div>
    </div>

    <div id="toastNotification" class="toast-notification">
        <span class="toast-icon">✅</span>
        <span class="toast-message" id="toastMessage">Done</span>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <script src="public/js/firebase-config.js?v=20260627a"></script>
    <script src="public/js/firebase-auth.js?v=39"></script>
    <script src="public/js/firebase-db.js?v=58"></script>
    <script src="public/js/app-config.js"></script>
    <script src="public/js/header-uniform.js?v=1.3"></script>
    <script src="public/js/shared-menu.js?v=4.3"></script>
    <script src="public/js/alerts.js?v=4"></script>
</body>
</html>
