<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>GISUGO Device Login Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #363f4f;
    color: #fff;
    min-height: 100vh;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { font-size: 1.15rem; margin: 0.5rem 0 1rem; text-align: center; }
  .card {
    background: #2a3140;
    border-radius: 12px;
    padding: 1rem;
    width: 100%;
    max-width: 420px;
    margin-bottom: 1rem;
  }
  button, .fb-link {
    display: block;
    width: 100%;
    padding: 0.9rem;
    border: none;
    border-radius: 8px;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
  }
  #startBtn { background: #1877f2; color: #fff; }
  #startBtn:disabled { background: #55606f; }
  .fb-link { background: #42b72a; color: #fff; margin-top: 0.75rem; }
  .code-display {
    text-align: center;
    font-size: 1.6rem;
    letter-spacing: 0.3rem;
    font-weight: 800;
    margin-top: 0.75rem;
    color: #ffd65c;
  }
  .hint { font-size: 0.8rem; color: #aab4c4; margin-top: 0.5rem; text-align: center; }
  #status {
    font-size: 1rem;
    font-weight: 700;
    text-align: center;
    padding: 0.5rem;
    border-radius: 8px;
    margin-top: 0.75rem;
    background: #414b5e;
  }
  #status.success { background: #1d7a34; }
  #status.fail { background: #a03030; }
  #log {
    font-family: Menlo, Consolas, monospace;
    font-size: 0.7rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    color: #cdd6e4;
    max-height: 45vh;
    overflow-y: auto;
  }
  .log-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.4rem; color: #8fa0b8; }
</style>
</head>
<body>
  <h1>GISUGO &mdash; Facebook Device Login Test</h1>

  <div class="card">
    <button id="startBtn" type="button">Start Facebook Device Login Test</button>
    <div id="linkArea" style="display:none;">
      <a id="fbLink" class="fb-link" href="#" target="_blank" rel="noopener">Confirm on Facebook</a>
      <div class="code-display" id="codeDisplay"></div>
      <div class="hint">If the code isn't pre-filled, enter the code above at facebook.com/device</div>
    </div>
    <div id="status">Idle &mdash; tap the button to begin</div>
  </div>

  <div class="card">
    <div class="log-title">Debug log (screenshot this if anything fails)</div>
    <div id="log"></div>
  </div>

<script>
(function() {
  'use strict';

  var APP_ID = '1027099963510428';
  var CLIENT_TOKEN = '2dbd136c5fec90f2c8ab4611558bf9b1';
  var GRAPH_VERSION = 'v21.0';
  var DEVICE_ACCESS_TOKEN = APP_ID + '|' + CLIENT_TOKEN;
  var STORAGE_KEY = 'gisugoDeviceLoginTest';

  var startBtn = document.getElementById('startBtn');
  var linkArea = document.getElementById('linkArea');
  var fbLink = document.getElementById('fbLink');
  var codeDisplay = document.getElementById('codeDisplay');
  var statusEl = document.getElementById('status');
  var logEl = document.getElementById('log');

  var pollTimer = null;
  var pollState = null; // { code, expiresAt, intervalMs }

  function log(msg) {
    var ts = new Date().toISOString().slice(11, 19);
    logEl.textContent += '[' + ts + '] ' + msg + '\n';
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className = cls || '';
  }

  function graphPost(path, params) {
    var body = new URLSearchParams(params).toString();
    var url = 'https://graph.facebook.com/' + GRAPH_VERSION + '/' + path;
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body
    }).then(function(res) { return res.json(); });
  }

  function startFlow() {
    startBtn.disabled = true;
    setStatus('Requesting device code from Facebook...');
    log('STEP 1: POST ' + GRAPH_VERSION + '/device/login (scope=public_profile)');

    graphPost('device/login', {
      access_token: DEVICE_ACCESS_TOKEN,
      scope: 'public_profile'
    }).then(function(data) {
      if (data.error) {
        log('STEP 1 FAILED: ' + JSON.stringify(data.error));
        setStatus('Failed to get device code (see log)', 'fail');
        startBtn.disabled = false;
        return;
      }
      log('STEP 1 OK: user_code=' + data.user_code + ' expires_in=' + data.expires_in + 's interval=' + data.interval + 's');

      pollState = {
        code: data.code,
        expiresAt: Date.now() + (data.expires_in * 1000),
        intervalMs: Math.max(5000, (data.interval || 5) * 1000)
      };
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(pollState)); } catch (e) {}

      var confirmUrl = 'https://www.facebook.com/device?user_code=' + encodeURIComponent(data.user_code);
      fbLink.href = confirmUrl;
      codeDisplay.textContent = data.user_code;
      linkArea.style.display = 'block';
      setStatus('Tap "Confirm on Facebook", approve, then come back to this tab');
      log('STEP 2: showing confirm link: ' + confirmUrl);
      log('WATCH FOR: does tapping it open the FACEBOOK APP or a browser tab?');

      schedulePoll(pollState.intervalMs);
    }).catch(function(err) {
      log('STEP 1 NETWORK ERROR: ' + (err && err.message ? err.message : String(err)));
      log('If this says "Load failed" or "Failed to fetch", the browser is likely CORS-blocked. We would need a Cloud Function proxy.');
      setStatus('Network/CORS error (see log)', 'fail');
      startBtn.disabled = false;
    });
  }

  function schedulePoll(delayMs) {
    if (pollTimer) clearTimeout(pollTimer);
    pollTimer = setTimeout(pollOnce, delayMs);
  }

  function pollOnce() {
    if (!pollState) return;
    if (Date.now() > pollState.expiresAt) {
      log('POLL: code expired (7 min limit). Start over.');
      setStatus('Code expired - tap the button to start again', 'fail');
      startBtn.disabled = false;
      clearSaved();
      return;
    }

    graphPost('device/login_status', {
      access_token: DEVICE_ACCESS_TOKEN,
      code: pollState.code
    }).then(function(data) {
      if (data.access_token) {
        log('POLL: ACCESS TOKEN RECEIVED (length=' + data.access_token.length + ')');
        clearSaved();
        verifyToken(data.access_token);
        return;
      }
      if (data.error) {
        var sub = data.error.error_subcode;
        if (sub === 1349174) {
          // Authorization pending - keep polling
          log('POLL: pending (user has not confirmed yet)');
          schedulePoll(pollState.intervalMs);
          return;
        }
        if (sub === 1349172) {
          log('POLL: told to slow down, backing off');
          schedulePoll(pollState.intervalMs * 2);
          return;
        }
        log('POLL FAILED: ' + JSON.stringify(data.error));
        setStatus('Polling failed (see log)', 'fail');
        startBtn.disabled = false;
        clearSaved();
        return;
      }
      log('POLL: unexpected response: ' + JSON.stringify(data));
      schedulePoll(pollState.intervalMs);
    }).catch(function(err) {
      log('POLL NETWORK ERROR: ' + (err && err.message ? err.message : String(err)) + ' - retrying');
      schedulePoll(pollState.intervalMs);
    });
  }

  function verifyToken(accessToken) {
    setStatus('Token received! Verifying with Graph API...');
    log('STEP 3: GET /me to verify the token works');
    fetch('https://graph.facebook.com/' + GRAPH_VERSION + '/me?fields=id,name&access_token=' + encodeURIComponent(accessToken))
      .then(function(res) { return res.json(); })
      .then(function(me) {
        if (me.error) {
          log('STEP 3 FAILED: ' + JSON.stringify(me.error));
          setStatus('Token received but /me failed (see log)', 'fail');
          return;
        }
        log('STEP 3 OK: id=' + me.id + ' name=' + me.name);
        log('=== TEST PASSED === This token would be handed to Firebase signInWithCredential().');
        setStatus('SUCCESS - logged in as ' + me.name, 'success');
      })
      .catch(function(err) {
        log('STEP 3 NETWORK ERROR: ' + (err && err.message ? err.message : String(err)));
        setStatus('Token received but verification errored (see log)', 'fail');
      });
  }

  function clearSaved() {
    pollState = null;
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  }

  // Resume polling if the page reloaded mid-flow (e.g. Facebook redirected back here)
  function tryResume() {
    var saved = null;
    try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); } catch (e) {}
    if (saved && saved.code && Date.now() < saved.expiresAt) {
      pollState = saved;
      startBtn.disabled = true;
      setStatus('Resumed - waiting for Facebook confirmation...');
      log('RESUME: found in-progress device login, polling immediately');
      pollOnce();
    }
  }

  // iOS throttles background-tab timers; poll immediately when the user returns
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible' && pollState) {
      log('TAB VISIBLE: polling now');
      pollOnce();
    }
  });

  startBtn.addEventListener('click', startFlow);

  log('Page loaded. UA: ' + navigator.userAgent);
  tryResume();
})();
</script>
</body>
</html>
