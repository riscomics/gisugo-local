# One-tap manual deploy — Cloud Functions only (mobile-friendly, no inputs).
name: Deploy Functions (manual)
on:
  workflow_dispatch:

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - run: npm ci
        working-directory: functions

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GISUGO1 }}

      - run: npm install -g firebase-tools

      - run: firebase deploy --only functions --project gisugo1 --non-interactive
