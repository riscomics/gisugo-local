# Live deploy when a PR is merged (push) to main → updates gisugo.com.
name: Deploy to Firebase Hosting (live)
on:
  push:
    branches:
      - main

jobs:
  deploy_live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GISUGO1 }}
          projectId: gisugo1
          channelId: live
