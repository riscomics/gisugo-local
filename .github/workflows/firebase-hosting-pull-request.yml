# Preview deploy for PRs — does NOT update gisugo.com (live).
# Posts a temporary preview URL as a PR comment.
name: Deploy to Firebase Hosting (preview)
on:
  pull_request:
    branches:
      - main

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GISUGO1 }}
          projectId: gisugo1
          expires: 30d
