# One-tap manual deploy — Firestore + Storage rules/indexes (mobile-friendly, no inputs).
name: Deploy Rules (manual)
on:
  workflow_dispatch:

jobs:
  deploy_rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GISUGO1 }}
          create_credentials_file: true
          export_environment_variables: true

      - run: npm install -g firebase-tools

      - name: Verify Firebase auth
        run: firebase projects:list --project gisugo1

      - run: firebase deploy --only firestore:rules,firestore:indexes,storage --project gisugo1 --non-interactive
